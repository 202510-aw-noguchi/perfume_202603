<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理ログイン</title>
  <style>
    :root {
      --bg: #f3f5f7;
      --card: #ffffff;
      --text: #1d2733;
      --sub: #637083;
      --line: #e5e9ef;
      --accent: #2563eb;
      --shadow: 0 8px 24px rgba(16, 24, 40, 0.05);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .card {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 22px 20px 18px;
    }
    h1 {
      margin: 0 0 16px;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .note {
      margin: 0 0 14px;
      font-size: 13px;
      color: var(--sub);
      min-height: 20px;
    }
    .field {
      margin-bottom: 12px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: #334155;
    }
    input {
      width: 100%;
      height: 40px;
      border: 1px solid var(--line);
      padding: 0 10px;
      font: inherit;
      color: inherit;
      background: #fff;
    }
    button {
      width: 100%;
      height: 40px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      font: inherit;
      cursor: pointer;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <section class="card">
    <h1>管理ログイン</h1>
    <p class="note" id="message"></p>
    <form method="post" action="/login">
      <div class="field">
        <label for="username">ID</label>
        <input id="username" name="username" type="text" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">パスワード</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <button type="submit">ログイン</button>
    </form>
  </section>

  <script>
    (function () {
      var msg = document.getElementById("message");
      var params = new URLSearchParams(window.location.search);
      if (params.has("error")) {
        msg.textContent = "IDまたはパスワードが正しくありません。";
        msg.style.color = "#b42318";
        return;
      }
      if (params.has("logout")) {
        msg.textContent = "ログアウトしました。";
        msg.style.color = "#175cd3";
        return;
      }
      msg.textContent = "管理画面にログインしてください。";
    })();
  </script>
</body>
</html>
