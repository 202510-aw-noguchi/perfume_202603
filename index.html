<!doctype html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="c-corp トップページ" />
    <title>c-corp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,600;1,600&family=Noto+Sans+JP:wght@400;500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <style>
        :root {
            --footer-h: 44px;
        }

        * {
            box-sizing: border-box;
        }

        .content {
            padding-bottom: 0;
        }

        .hero {
            position: relative;
            width: 100%;
            height: calc(100vh - var(--footer-h));
            min-height: 0;
            overflow: hidden;
        }

        .hero-slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 1.1s ease;
        }

        .hero-slide.is-active {
            opacity: 1;
        }

        .hero-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .hero-slide-link {
            position: absolute;
            inset: 0;
            z-index: 3;
            display: block;
            cursor: pointer;
        }

        .hero-overlay {
            position: absolute;
            left: 11%;
            bottom: 40%;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 16px;
        }


        .hero-title {
            margin: 0;
            font-family: "Cormorant", serif;
            font-style: italic;
            font-weight: 600;
            font-size: 82px;
            letter-spacing: 0.08em;
            color: #ffffff;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
        }


        .footer-pc,
        .footer-sp {
            width: 100%;
            margin-top: 0;
            height: var(--footer-h);
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--corp);
        }

        .footer-sp {
            display: none;
        }

        @media (max-width: 1280px) {
            .sp-drawer {
                z-index: 6;
            }

            .sp-header {
                z-index: 5;
            }

            .hero-title {
                font-size: 72px;
            }

            .hero-overlay {
                left: 9%;
                bottom: 36%;
            }
        }

        @media (max-width: 900px) {
            :root {
                --footer-h: 64px;
            }

            .sp-header {
                top: 10px;
            }

            .hero-title {
                font-size: 58px;
            }

            .hero-overlay {
                left: 8%;
                bottom: 34%;
                gap: 12px;
            }

            .footer-pc,
            .footer-sp {
                margin-top: 0;
                height: var(--footer-h);
                min-height: 0;
                padding: 0 12px;
            }

            .footer-pc {
                display: none;
            }

            .footer-sp {
                display: flex;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <aside class="sidebar"></aside>

        <main class="content">
            <div class="sp-header"></div>
            <div class="sp-drawer" id="sp-drawer"></div>

            <section class="hero" aria-label="メインビジュアル">
                <div class="hero-slide is-active">
                    <a class="hero-slide-link" href="brands.html" aria-label="ブランドページへ"></a>
                    <img src="image/Brand_Top_1.png" alt="メインビジュアル1">
                    <div class="hero-overlay">
                        <p class="hero-title">Brands</p>
                    </div>
                </div>
                <div class="hero-slide">
                    <a class="hero-slide-link" href="workshop.html" aria-label="ワークショップページへ"></a>
                    <img src="image/Brand_Top_2.png" alt="メインビジュアル2">
                    <div class="hero-overlay">
                        <p class="hero-title">Workshop</p>
                    </div>
                </div>
                <div class="hero-slide">
                    <a class="hero-slide-link" href="magazine.html" aria-label="マガジンページへ"></a>
                    <img src="image/Brand_Top_3.png" alt="メインビジュアル3">
                    <div class="hero-overlay">
                        <p class="hero-title">Magazine</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <footer class="footer-pc">
        <p>静かに、深く、香りと向き合う時間を。　© 2026 c-corp. All Rights Reserved.</p>
    </footer>
    <footer class="footer-sp">
        <p>静かに、深く、香りと向き合う時間を。<br>© 2026 c-corp. All Rights Reserved.</p>
    </footer>

    <script src="common-layout.js"></script>
    <script>
        (function () {
            var slides = document.querySelectorAll(".hero-slide");
            if (!slides.length) return;

            var index = 0;
            var intervalMs = 4500;

            function show(nextIndex) {
                slides[index].classList.remove("is-active");
                index = nextIndex;
                slides[index].classList.add("is-active");
            }

            setInterval(function () {
                var next = (index + 1) % slides.length;
                show(next);
            }, intervalMs);
        })();
    </script>
</body>

</html>
