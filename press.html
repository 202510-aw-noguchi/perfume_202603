<!doctype html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Press Release" />
    <meta name="title" content="Press Release" />
    <title>Press Release</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,600;1,600&family=Noto+Sans+JP:wght@400;500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <style>
        * {
            box-sizing: border-box;
        }

        .lead-area {
            max-width: 760px;
            margin: 30px auto 62px;
            text-align: center;
        }

        .lead-area .intro-image {
            width: 100%;
            max-width: 760px;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            margin: 30px auto 0;
        }

        .wrap>section>h2::after {
            display: none;
        }

        .wrap>section>h2 {
            font-family: "Cormorant", serif;
            font-style: italic;
            font-weight: 400;
            font-size: 2em;
            line-height: 1.4;
        }

        .wrap>section>h2+p {
            margin: -20px 0 52px;
            text-align: center;
            font-size: 0.875em;
            line-height: 1.6;
            letter-spacing: 0.06em;
        }

        .wrap>section>h2+p::after {
            content: "";
            display: block;
            width: 120px;
            margin: 24px auto 34px;
            border-top: 1px solid #c9c9c9;
        }

        .wrap .feature>div {
            max-width: 760px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .wrap .feature p {
            margin: 0 0 1.25em;
            line-height: 1.9;
            text-align: left;
        }

        .press-list {
            max-width: 760px;
            margin: 0 auto 72px;
            padding: 0 20px;
        }

        .press-list ul {
            list-style: none;
            margin: 0;
            padding: 0;
            border-top: 1px solid #d9d9d9;
        }

        .press-list li {
            border-bottom: 1px solid #d9d9d9;
        }

        .press-list a {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 20px;
            align-items: center;
            padding: 16px 0;
            color: inherit;
            text-decoration: none;
        }

        .press-list a:hover {
            color: var(--accent);
            text-decoration: none;
        }

        .press-list time {
            font-size: 0.9em;
            color: #666666;
        }

        @media (max-width: 900px) {
            .press-list {
                padding-left: 0;
                padding-right: 0;
                margin-bottom: 56px;
            }

            .press-list a {
                grid-template-columns: 1fr;
                gap: 8px;
            }
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        @media (max-width: 900px) {
            .wrap {
                padding-top: 0;
            }

            .wrap .feature>div {
                padding-left: 0;
                padding-right: 0;
            }

            h2 {
                margin: 58px 0 26px;
            }


            body {
                line-height: 1.65;
            }

        }
    </style>
</head>

<body>
    <div class="page">
        <aside class="sidebar"></aside>
        <main class="content">
            <div class="sp-header"></div>
            <div class="sp-drawer" id="sp-drawer"></div>

            <div class="wrap">
                <section>
                    <h1>Press Release</h1>
                </section>
                <section class="lead-area">
                    <p>報道機関の方々に発信する最新情報をお伝えします。</p>
                </section>
                <section class="press-list" aria-label="プレスリリース一覧">
                    <ul>
                        <li>
                            <a href="press/solar-terms.html">
                                <time datetime="2026-03-20">2026.03.20</time>
                                <span>四季の移ろいを香りで纏うフレグランスシリーズ「Solar Terms」誕生</span>
                            </a>
                        </li>
                        <li>
                            <a href="press/website-renewal.html">
                                <time datetime="2026-03-17">2026.03.17</time>
                                <span>サイトをリニューアルしました</span>
                            </a>
                        </li>
                    </ul>
                </section>

            </div>
        </main>
    </div>
    <footer class="footer-pc">
        <p>静かに、深く、香りと向き合う時間を。 © 2026 c-corp. All Rights Reserved.</p>
    </footer>
    <footer class="footer-sp">
        <p>静かに、深く、香りと向き合う時間を。<br>© 2026 c-corp. All Rights Reserved.</p>
    </footer>
    <script src="common-layout.js"></script>
</body>

</html>
